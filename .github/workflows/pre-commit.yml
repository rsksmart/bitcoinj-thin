name: Pre-commit Checks

on:
  push:
    branches:
      - "master"
      - "*-rc"
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - "**"

# Declare default permissions as read only.
permissions: read-all

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'   # Or 'zulu', 'adopt', etc., if you prefer
          java-version: '8'

      - name: Verify script integrity
        run: |
          # The trusted SHA-256 checksum of your script
          TRUSTED_SHASUM="05db678734d5c160196a018abc2fd6bbbfa4205ee237993a1599e4ceab1fcc78" # Example for an empty file

          # Calculate the shasum of the script in the pull request
          CALCULATED_SHASUM=$(sha256sum ../../tools/checkstyle.sh | awk '{ print $1 }')

          # Compare the checksums
          if [ "$TRUSTED_SHASUM" != "$CALCULATED_SHASUM" ]; then
            echo "::error::Script has been modified and its checksum does not match the trusted checksum."
            exit 1
          fi

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit on push diff
        if: github.event_name == 'push'
        run: |
          pre-commit run --show-diff-on-failure \
            --from-ref "${{ github.event.before }}" \
            --to-ref   "${{ github.sha }}"

      - name: Run pre-commit on PR diff
        if: github.event_name == 'pull_request'
        run: |
          pre-commit run --show-diff-on-failure \
            --from-ref "${{ github.event.pull_request.base.sha }}" \
            --to-ref   "${{ github.sha }}" 
